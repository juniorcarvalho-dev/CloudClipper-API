<!DOCTYPE html>

<html lang="pt-BR"> 

<head>
  
  <meta charset="UTF-8"> <!-- Define a codificação -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--configurações de visualização para dispositivos móveis-->
  <title>CloudClipper</title> <!-- Título exibido na aba do navegador -->
  <link rel="stylesheet" href="styles.css"> <!-- Inclui o arquivo de estilos CSS local -->
  <link rel="icon" href="IcoPrin.png" type="image/png" > <!-- Icone do Título -->
  <script src="https://cdn.tailwindcss.com"></script> <!-- Tailwind CSS -->
  <style>
  body {
    font-family: "Lucida Sans", "Lucida Grande", sans-serif; 
  }
  </style> <!-- Fonte Lucida -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

</head>

<body>
  
    <header>
        <div class="logo">
          <img class="icon" src="https://img.icons8.com/nolan/64/movavi.png" alt="movavi"/>
          <h1>CloudClipper</h1>
        </div>
        <nav>
          <a href="#">Início</a>
          <a href="#">Upload</a>
          <a href="#">Contato</a>
        </nav>
    </header>
  <section class="app-container"> 
    <div class="interface-box">
        <div class="input-group">
            <label for="apiKey">Chave da API do GEMINI:</label>
                <div class="input-wrapper">
                  <input type="password" id="apiKey" placeholder="      Insira a sua API key">
                  <button type="button" id="toggleKey"> <img width="16" height="16" src="https://img.icons8.com/small/16/invisible.png" alt="invisible"/> </button>
                </div>
            <small class="hint">Sua chave não será compartilhada !</small>
        </div>
    
    
        <div class="video-container">
            <h2>🎬 Destaque do Momento</h2>
            <div id="loader" class="loader hidden">
                <div class="spinner"></div>
                <p>Processando transcrição e gerando clipe viral...</p>
            </div>
            <video id="video" controls class="video-player"></video>  <!-- Elemento de vídeo que irá reproduzir o trecho viral gerado -->
        </div>
    
        <button id="uploadwidget" class="cloudinary-button glow">Upload files</button>
    </div>  
</section>
  

  <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script> <!-- Inclusão do script da Cloudinary para o widget de upload -->

  <script type="text/javascript">
    // Referências aos elementos da página que serão usados pelo JavaScript
    const el = {
     
      video: document.getElementById('video'),
      apiKey: document.getElementById('apiKey'),
      button: document.getElementById('uploadwidget'),
      loader: document.getElementById('loader'),
      toggleKey: document.getElementById('toggleKey')
  }

    // Função para alternar visibilidade da senha
    el.toggleKey.addEventListener('click', () => {
      const isPassword = el.apiKey.type === 'password';
      el.apiKey.type = isPassword ? 'text' : 'password';
      const icon = el.toggleKey.querySelector('img');
      icon.src = isPassword ? 'https://img.icons8.com/small/16/visible.png' : 'https://img.icons8.com/small/16/invisible.png';
      icon.alt = isPassword ? 'visible' : 'invisible';
      // Animação suave no ícone
      gsap.to(icon, { duration: 0.2, scale: 1.2, yoyo: true, repeat: 1, ease: "power2.inOut" });
    });

    const app = {
      transcriptionURL: '', // URL onde a transcrição será consultada
      public_id: '', // ID público do arquivo enviado para a Cloudinary

      // Aguarda até que a transcrição esteja disponível na Cloudinary
      waitForTranscription: async () => {
        el.loader.classList.remove('hidden'); // Mostra o loader
        gsap.fromTo(el.loader, { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.5 });

        const maxTentativas = 30;
        const delay = 2000; // intervalo de 2 segundos entre tentativas

        for (let tentativa = 1; tentativa <= maxTentativas; tentativa++) {
          const url = `https://res.cloudinary.com/${config.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`
          try {
            console.log(`Tentativa ${tentativa}/${maxTentativas}: Verificando transcrição...`);
            const response = await fetch(url);

            if (response.ok) {
              // Se a transcrição estiver disponível, salva a URL e retorna sucesso
              app.transcriptionURL = url;
              console.log('Transcrição encontrada', url);
              el.loader.classList.add('hidden'); // Esconde o loader
              return true;
            }
          } catch (error) {
            // Mostra erro de rede ou de acesso à URL
            console.log(`Tentativa ${tentativa} falhou: ${error.message}`);
          }

          if (tentativa < maxTentativas) {
            await new Promise(resolve => setTimeout(resolve, delay));
          }
        }

        el.loader.classList.add('hidden'); // Esconde o loader mesmo se falhar
        console.log('Transcrição não encontrada após várias tentativas.');
        return false;
      },

      // Busca o texto da transcrição a partir da URL guardada
      getTranscriptionURL: async () => {
        const response = await fetch(app.transcriptionURL);
        return response.text();
      },

      // Chama a API Gemini para identificar o momento viral do vídeo
      getViralMoment: async () => {
        const transcription = await app.getTranscriptionURL();
        const model = 'gemini-2.5-flash';
        const endpointGemini = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

        // Prompt enviado ao Gemini para que ele retorne apenas o trecho de vídeo desejado
        const prompt = `
Role: You are a professional video editor specializing in viral content.
Task: Analyze the transcription below and identify the most engaging, funny, or surprising segment.
Constraints:
1. Duration: Minimum 30 seconds, Maximum 60 seconds.
2. Format: Return ONLY the start and end string for Cloudinary. Format: so_<start_seconds>,eo_<end_seconds>
3. Examples: "so_10, eo_20" or "so_12.5, eo_45.2"
4. CRITICAL: Do not use markdown, do not use quotes, do not explain. Return ONLY the raw string.

Transcription:
${transcription}`;

        const headers = {
          'x-goog-api-key': el.apiKey.value,
          'Content-Type': 'application/json'
        };

        const contents = [
          {
            parts: [
              {
                text: prompt
              }
            ]
          }
        ];

        const maxTentativas = 3;
        const retryDelay = 1500; // ms

        for (let tentativa = 1; tentativa <= maxTentativas; tentativa++) {
          try {
            const response = await fetch(endpointGemini, {
              method: 'POST',
              headers,
              body: JSON.stringify({ contents })
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Gemini error ${response.status}: ${text}`);
            }

            const data = await response.json();
            const rawText = data.candidates[0].content.parts[0].text.trim();

            // Remove textos extras e retorna apenas o formato esperado
            return rawText.replace(/'''/g, '').replace(/json/g, "").trim();

          } catch (error) {
            const isLastAttempt = tentativa === maxTentativas;
            console.log(`Gemini falhou (tentativa ${tentativa}/${maxTentativas}):`, error.message);

            if (isLastAttempt) {
              throw error;
            }

            await new Promise(resolve => setTimeout(resolve, retryDelay));
          }
        }
      }
    }

    // Configuração do Cloudinary para o widget de upload
    const config = {
      cloudName: 'dokq0iokf',
      uploadPreset: 'upload_nlw'
    };

    // Cria o widget de upload da Cloudinary com callback de resultado
    const myWidget = cloudinary.createUploadWidget(
      config,
      async (error, result) => {
        console.log('error: ', error);

        if (!error && result && result.event === "success") {
          console.log('Upload concluído com sucesso:', result.info);

          // Salva o ID público do arquivo enviado para gerar o vídeo clip depois
          app.public_id = result.info.public_id;

          try {
            const isReady = await app.waitForTranscription();
            if (!isReady) {
              throw new Error('erro ao buscar transcrição');
            }

            // Solicita ao Gemini o trecho viral e monta a URL do vídeo final
            const viralMoment = await app.getViralMoment(); // so_12.5, eo_45.2
            const viralMomentURL = `https://res.cloudinary.com/${config.cloudName}/video/upload/${viralMoment}/${app.public_id}.mp4`;
            el.video.setAttribute('src', viralMomentURL);

            // Animação para o vídeo aparecer
            gsap.fromTo(el.video, { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.7)" });

          } catch (error) {
            console.log({ error });
          }
        }
      }
    );

    // Adiciona o clique no botão para abrir o widget apenas se a chave de API estiver preenchida
    el.button.addEventListener("click", function () {
      if (!el.apiKey.value) {
        alert('Por favor, informe sua chave de API do GEMINI para continuar.');
        el.apiKey.focus();
        gsap.to(el.apiKey, { duration: 0.3, x: -10, yoyo: true, repeat: 3, ease: "power2.inOut" });
        return;
      }
      myWidget.open();
      // Animação do botão ao clicar
      gsap.to(el.button, { duration: 0.2, scale: 0.95, yoyo: true, repeat: 1, ease: "power2.inOut" });
    }, false);
  </script>

  <script>
    // Animações GSAP para tornar o site mais impactante
    gsap.set("header", { y: -100, opacity: 0 });
    gsap.set(".interface-box", { y: 50, opacity: 0, scale: 0.9 });
    gsap.set(".video-container", { y: 50, opacity: 0 });
    gsap.set("footer", { y: 100, opacity: 0 });
    gsap.set(".video-player", { opacity: 0, scale: 0.8 });

    gsap.to("header", { duration: 1, y: 0, opacity: 1, ease: "power2.out" });
    gsap.to(".interface-box", { duration: 1, delay: 0.3, y: 0, opacity: 1, scale: 1, ease: "back.out(1.7)" });
    gsap.to(".video-container", { duration: 1, delay: 0.6, y: 0, opacity: 1, ease: "power2.out" });
    gsap.to("footer", { duration: 1, delay: 0.9, y: 0, opacity: 1, ease: "power2.out" });

    // Animação adicional para o logo
    gsap.from(".logo img", { duration: 0.8, delay: 0.2, rotation: -180, scale: 0, ease: "back.out(1.7)" });
    gsap.from(".logo h1", { duration: 0.8, delay: 0.4, x: -50, opacity: 0, ease: "power2.out" });

    // Animação para os links do nav
    gsap.from("nav a", { duration: 0.6, delay: 0.6, y: -20, opacity: 0, stagger: 0.1, ease: "power2.out" });

    // Animação para o botão de upload
    gsap.fromTo(
      ".cloudinary-button",
      { opacity: 0, y: 30, scale: 0.8 },
      { duration: 0.8, delay: 1, opacity: 1, y: 0, scale: 1, ease: "back.out(1.7)" }
    );

    // Efeito de glow pulsante no botão
    gsap.to(".cloudinary-button", {
      duration: 1.8,
      boxShadow: "0 0 36px rgba(255,107,107,0.7), inset 0 0 18px rgba(255,255,255,0.18)",
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut",
      delay: 2.2
    });

    // Animação para os inputs
    gsap.from(".input-group", { duration: 0.8, delay: 0.8, x: -30, opacity: 0, ease: "power2.out" });
  </script>

<footer>
  <p>&copy; 2026 FlashTrend - Todos os direitos reservados</p>
</footer>

</body>
</html>
